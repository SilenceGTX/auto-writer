# Development override with hot reload for both frontend and backend.

services:
  backend:
    build:
      context: ./backend
      target: dev
    environment:
      AW_DEBUG: "true"
      AW_DATABASE_URL: sqlite+aiosqlite:///./data/auto_writer.db
      AW_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    ports:
      - "8000:8000"

  app:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_TARGET: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
