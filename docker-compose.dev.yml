# Development override with hot reload for both frontend and backend.

services:
  backend:
    image: auto-writer-backend:dev
    build:
      context: ./backend
      target: dev
    environment:
      AW_DEBUG: "true"
      AW_DATABASE_URL: sqlite+aiosqlite:///./data/auto_writer.db
      AW_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    ports:
      - "8000:8000"

  app:
    image: auto-writer-app:dev
    build:
      context: ./frontend
      target: dev
    environment:
      # Reach the backend directly over the compose network instead of routing
      # back through the host's published port (which is flaky on WSL2).
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
