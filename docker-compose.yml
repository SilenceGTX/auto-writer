version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8000:8000"
    environment:
      - AW_DATABASE_URL=sqlite+aiosqlite:///./data/auto_writer.db
      - AW_LLM_API_KEY=${AW_LLM_API_KEY:-}
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    depends_on:
      - backend
