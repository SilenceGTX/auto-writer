services:
  backend:
    build:
      context: ./backend
      target: prod
    environment:
      AW_DATABASE_URL: sqlite+aiosqlite:///./data/auto_writer.db
      AW_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  app:
    build:
      context: ./frontend
      target: prod
    depends_on:
      - backend
    ports:
      - "8080:80"
