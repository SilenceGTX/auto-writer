services:
  backend:
    image: auto-writer-backend:prod
    build:
      context: ./backend
      target: prod
    environment:
      AW_DATABASE_URL: sqlite+aiosqlite:///./data/auto_writer.db
      AW_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      # AW_LOG_LEVEL: DEBUG
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/api/health")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  app:
    image: auto-writer-app:prod
    build:
      context: ./frontend
      target: prod
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
