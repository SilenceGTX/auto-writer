name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff lint
        run: uv run ruff check app tests

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (eslint + tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm exec eslint src

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Vitest
        run: pnpm exec vitest run

  docker-build:
    name: Docker build (prod images)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production images
        run: docker compose build backend app

  desktop-bundle:
    name: Desktop bundle smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend and assemble desktop bundle
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build
          cd ..
          python scripts/assemble_release.py --output /tmp/auto-writer-desktop --version ci

      - name: Verify bundle layout
        run: |
          test -x /tmp/auto-writer-desktop/start.sh
          test -f /tmp/auto-writer-desktop/static/index.html
          test -d /tmp/auto-writer-desktop/backend/.venv
          test -x /tmp/auto-writer-desktop/backend/runtime/python/bin/python3 \
            || test -x /tmp/auto-writer-desktop/backend/runtime/python/bin/python
          /tmp/auto-writer-desktop/backend/runtime/python/bin/python3 -c \
            "from pathlib import Path; import sys; b=Path('/tmp/auto-writer-desktop/backend'); s=next((b/'.venv'/'lib').glob('python*/site-packages')); sys.path[:0]=[str(s),str(b)]; import fastapi; print('ok')"
